{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>{{ title }}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select name="category" class="form-select" required>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" 
                                    {% if cat.id == object.category_id %}selected{% endif %}>
                                    {{ cat.name }} ({{ cat.type.name }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Название подкатегории</label>
                            <input type="text" name="name" value="{{ object.name }}" 
                                   class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-success">Сохранить изменения</button>
                        <a href="{% url back_url %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
